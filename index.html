<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>NeuroAtlas — Htr2a GFP Atlas</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>

<style>

body{
background:#07090c;
color:#dde2ec;
font-family:'Syne',sans-serif;
margin:0;
}

header{
padding:25px 40px;
border-bottom:1px solid #1a1f2c;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
font-size:22px;
font-weight:600;
}

#viewer{
width:100%;
height:75vh;
background:black;
}

.sectionBar{
display:flex;
gap:10px;
overflow-x:auto;
padding:15px;
border-top:1px solid #1a1f2c;
background:#0c0f15;
}

.thumb{
height:80px;
border-radius:6px;
cursor:pointer;
opacity:.75;
transition:.2s;
}

.thumb:hover{
opacity:1;
transform:scale(1.05);
}

.meta{
padding:20px 40px;
font-family:'JetBrains Mono',monospace;
font-size:12px;
color:#6b7794;
}

</style>

</head>


<body>


<header>

<h1>Htr2a-EGFP-CreERT2 Brain Atlas</h1>

<div>GFP Channel • Olympus VS120</div>

</header>


<div id="viewer"></div>


<div class="meta">

Section ID: <span id="sectionLabel">TC-1_01</span>

</div>


<div class="sectionBar" id="sectionBar"></div>



<script>

let sections = [

"TC-1_01",
"TC-1_02",
"TC-1_03",
"TC-1_04",
"TC-1_05",
"TC-1_06",
"TC-1_07",
"TC-1_08",
"TC-1_09",
"TC-1_10",
"TC-2_02",
"TC-2_03",
"TC-2_04",
"TC-2_05",
"TC-2_06",
"TC-2_07",
"TC-2_08"

];



let viewer = OpenSeadragon({

id:"viewer",

prefixUrl:"https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",

showNavigator:true,

zoomPerScroll:1.2,

maxZoomPixelRatio:4,

minZoomLevel:0.5,

visibilityRatio:1,

constrainDuringPan:true

});



function loadSection(section){

viewer.open({

type:"image",

url:"Images/full/" + section + ".jpg"

});

document.getElementById("sectionLabel").innerText = section;

}



function buildThumbnails(){

let bar=document.getElementById("sectionBar");

sections.forEach(section=>{

let img=document.createElement("img");

img.src="Images/thumbs/resized_" + section + ".jpg";

img.className="thumb";

img.onclick=()=>loadSection(section);

bar.appendChild(img);

});

}



buildThumbnails();

loadSection(sections[0]);


</script>


</body>
</html>
